name: Bug report
description: Something behaves incorrectly.
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: Observed behaviour, and what was expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Minimal steps. Include version/tag, commit SHA, and environment.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / tag
      description: Released version or commit SHA where this was seen.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / evidence
      render: shell
