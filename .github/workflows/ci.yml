name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  python:
    name: Python Lint / Typecheck / Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.2.0
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run mypy
      - run: uv run pytest

  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Validate JSON and Python syntax
        run: |
          python3 -m json.tool schema/provisioning-manifest.v2.schema.json >/dev/null
          python3 -m json.tool schema/schema.min.json >/dev/null
          python3 -m py_compile bin/stalwart-provisioner schema/validate-plan.py scripts/pack-deploy-bundle.py
      - name: Validate accepted fixtures
        run: |
          bin/stalwart-provisioner validate manifest examples/manifest.valid.json examples/dev-manifest.json
          bin/stalwart-provisioner validate plan --schema schema/schema.min.json examples/plan.valid.ndjson plan.ndjson.tmpl
      - name: Validate rejected manifest fixtures
        run: |
          for fixture in tests/fixtures/invalid-manifests/*.json; do
            if bin/stalwart-provisioner validate manifest "$fixture"; then
              echo "unexpected manifest validation success: $fixture" >&2
              exit 1
            fi
          done
      - name: Validate rejected plan fixtures
        run: |
          for fixture in tests/fixtures/invalid-plans/*.ndjson; do
            if bin/stalwart-provisioner validate plan --schema schema/schema.min.json "$fixture"; then
              echo "unexpected plan validation success: $fixture" >&2
              exit 1
            fi
          done

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install ShellCheck
        run: |
          if ! command -v shellcheck >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y shellcheck
          fi
      - name: Lint shell scripts
        run: shellcheck scripts/*.sh

  workflow-lint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Download actionlint
        id: actionlint
        shell: bash
        run: bash <(curl --fail --silent --show-error --location https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
      - name: Lint GitHub Actions workflows
        shell: bash
        run: |
          "${{ steps.actionlint.outputs.executable }}" -color .github/workflows/*.yml

  deploy-bundle:
    name: Deploy Bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Pack deploy bundle
        run: python3 scripts/pack-deploy-bundle.py --version 0.0.0-ci --out /tmp/stalwart-provisioner-deploy-bundle.tar
      - name: Inspect deploy bundle
        run: tar -tf /tmp/stalwart-provisioner-deploy-bundle.tar

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build image
        run: docker build .

  pipeline-complete:
    name: Pipeline Complete
    if: always()
    needs: [python, validate, shellcheck, workflow-lint, deploy-bundle, docker-build]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all gating jobs succeeded
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
