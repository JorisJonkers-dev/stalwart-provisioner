name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish, for example v0.2.0
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      # Author the release PR with the personal-stack-agents App token (not the
      # default GITHUB_TOKEN) so CI runs on the PR without a manual approval
      # gate. Best-effort: falls back to GITHUB_TOKEN when the App secrets or
      # installation are absent.
      - uses: actions/create-github-app-token@v3
        id: app-token
        continue-on-error: true
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
      - id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-target:
    name: Resolve Publish Target
    needs: release-please
    if: ${{ always() }}
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.target.outputs.should_publish }}
      tag_name: ${{ steps.target.outputs.tag_name }}
    steps:
      - id: target
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          RELEASE_CREATED: ${{ needs.release-please.outputs.release_created }}
          RELEASE_TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            if [ -z "$INPUT_RELEASE_TAG" ]; then
              echo "release_tag is required for workflow_dispatch" >&2
              exit 1
            fi
            echo "should_publish=true" >>"$GITHUB_OUTPUT"
            echo "tag_name=$INPUT_RELEASE_TAG" >>"$GITHUB_OUTPUT"
          elif [ "$RELEASE_CREATED" = "true" ]; then
            echo "should_publish=true" >>"$GITHUB_OUTPUT"
            echo "tag_name=$RELEASE_TAG" >>"$GITHUB_OUTPUT"
          else
            echo "should_publish=false" >>"$GITHUB_OUTPUT"
            echo "tag_name=" >>"$GITHUB_OUTPUT"
          fi

  publish:
    name: Publish GHCR Image
    needs: publish-target
    if: ${{ needs.publish-target.outputs.should_publish == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.publish-target.outputs.tag_name }}
      - name: Log in to GHCR
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: printf '%s\n' "$GHCR_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
      - name: Build and push image
        env:
          IMAGE: ghcr.io/jorisjonkers-dev/stalwart-provisioner
          RELEASE_TAG: ${{ needs.publish-target.outputs.tag_name }}
        run: |
          version="${RELEASE_TAG#v}"
          commit_sha="$(git rev-parse HEAD)"
          docker build -t "${IMAGE}:${version}" -t "${IMAGE}:sha-${commit_sha}" .
          docker push "${IMAGE}:${version}"
          docker push "${IMAGE}:sha-${commit_sha}"
          echo "Published ${IMAGE}:${version}"

  publish-deploy-bundle:
    name: Publish Deploy Bundle
    needs: [publish-target, publish]
    if: ${{ needs.publish-target.outputs.should_publish == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.publish-target.outputs.tag_name }}
      - uses: oras-project/setup-oras@v2
      - name: Pack deploy bundle
        env:
          RELEASE_TAG: ${{ needs.publish-target.outputs.tag_name }}
        run: |
          version="${RELEASE_TAG#v}"
          python3 scripts/pack-deploy-bundle.py --version "$version" --out stalwart-provisioner-deploy-bundle.tar
      - name: Log in to GHCR
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: printf '%s\n' "$GHCR_TOKEN" | oras login ghcr.io --username "$GITHUB_ACTOR" --password-stdin
      - name: Publish deploy bundle
        env:
          BUNDLE: ghcr.io/jorisjonkers-dev/stalwart-provisioner-deploy-bundle
          RELEASE_TAG: ${{ needs.publish-target.outputs.tag_name }}
        run: |
          version="${RELEASE_TAG#v}"
          oras push "${BUNDLE}:${version}" stalwart-provisioner-deploy-bundle.tar:application/vnd.jorisjonkers.deployment.bundle.v1+tar
