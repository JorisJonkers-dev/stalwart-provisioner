name: 'Add to Project'

'on':
  'issues':
    'types':
      - 'opened'
      - 'reopened'
      - 'transferred'
  'pull_request_target':
    'types':
      - 'opened'
      - 'reopened'

'permissions':
  'contents': 'read'

'jobs':
  'add-to-project':
    'if': "${{ vars.PROJECT_AUTOMATION_ENABLED == 'true' }}"
    'uses': 'JorisJonkers-dev/github-workflows/.github/workflows/add-to-project.yml@v0.8.0'
    'secrets': 'inherit'

  'add-to-project-not-configured':
    'if': "${{ vars.PROJECT_AUTOMATION_ENABLED != 'true' }}"
    'runs-on': 'ubuntu-latest'
    'steps':
      - 'run': "echo 'Project automation is not enabled for this repository.'"
